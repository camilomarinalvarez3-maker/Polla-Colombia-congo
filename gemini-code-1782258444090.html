<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polla Copa del Mundo — Grupo LANDFUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f3; --surface: #ffffff; --surface2: #f0efe9;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
      --text: #1a1a18; --text2: #5f5e58; --text3: #9a9991;
      --col-bg: #fff8e6; --col-border: #f5c842; --col-text: #7a5800;
      --con-bg: #fdecea; --con-border: #f5a09a; --con-text: #8c1f1a;
      --tie-bg: #ebebeb; --tie-border: #ccc; --tie-text: #555;
      --green-bg: #eaf5e3; --green-border: #7ec96a; --green-text: #2a6e12;
      --warn-bg: #fff8e6; --warn-border: #f5c842; --warn-text: #7a5800;
      --blue-bg: #e6f0fb; --blue-border: #7ab0e8; --blue-text: #1a4e8a;
      --group-bg: #1a1a2e; --group-color: #e0c96e;
      --radius: 10px; --radius-sm: 6px;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
    .page { max-width: 580px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 2rem; padding: 2rem 1.5rem 1.5rem; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
    .event-label { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue-text); background: var(--blue-bg); border: 1px solid var(--blue-border); border-radius: 20px; padding: 3px 12px; margin-bottom: 0.75rem; }
    .group-badge { display: inline-block; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; color: var(--group-color); background: var(--group-bg); border-radius: 20px; padding: 4px 16px; margin-bottom: 0.75rem; }
    .flags { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 0.75rem 0; }
    .flag-block { text-align: center; }
    .flag-emoji { font-size: 44px; display: block; line-height: 1; }
    .flag-name { font-size: 13px; color: var(--text2); margin-top: 4px; font-weight: 500; }
    .vs-text { font-size: 18px; font-weight: 600; color: var(--text3); margin-top: -8px; }
    .header h1 { font-size: 20px; font-weight: 600; color: var(--text); margin-top: 0.5rem; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 8px; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
    .card label { display: block; font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
    .input-row { display: flex; gap: 8px; }
    input[type="text"], input[type="password"] { flex: 1; height: 40px; padding: 0 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
    input[type="text"]:focus, input[type="password"]:focus { border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
    .btn { height: 40px; padding: 0 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; }
    .btn:active { transform: scale(0.97); }
    .btn-blue { background: #378add; color: #fff; }
    .btn-blue:hover { opacity: 0.88; }
    .btn-red { background: #e24b4a; color: #fff; font-size: 13px; }
    .btn-red:hover { opacity: 0.88; }
    .error-msg { font-size: 13px; color: #c0392b; margin-top: 6px; display: none; }
    .banner { border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; font-weight: 500; margin-bottom: 1rem; display: none; align-items: center; gap: 8px; }
    .banner.show { display: flex; }
    .banner-green { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green-text); }
    .banner-warn { background: var(--warn-bg); border: 1px solid var(--warn-border); color: var(--warn-text); }
    .table-section { margin-top: 1.5rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .section-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .count-pill { font-size: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text3); border-radius: 20px; padding: 2px 10px; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead tr { background: var(--surface2); }
    thead th { padding: 10px 14px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text3); text-align: left; border-bottom: 1px solid var(--border); }
    thead th.center { text-align: center; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.2s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody tr.new-row { background: var(--green-bg); }
    td { padding: 12px 14px; color: var(--text); vertical-align: middle; }
    td.center { text-align: center; }
    .pos { color: var(--text3); font-size: 12px; font-weight: 500; width: 32px; }
    .user-name { font-weight: 500; }
    .score-cell { font-size: 15px; font-weight: 600; text-align: center; letter-spacing: 2px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid transparent; }
    .badge-col { background: var(--col-bg); border-color: var(--col-border); color: var(--col-text); }
    .badge-con { background: var(--con-bg); border-color: var(--con-border); color: var(--con-text); }
    .badge-tie { background: var(--tie-bg); border-color: var(--tie-border); color: var(--tie-text); }
    .empty-row td { text-align: center; color: var(--text3); font-size: 14px; padding: 2.5rem 1rem; }
    .admin-toggle-wrap { text-align: center; margin-top: 2.5rem; }
    .admin-toggle-btn { background: none; border: none; font-size: 12px; color: var(--text3); cursor: pointer; text-decoration: underline; font-family: inherit; }
    .admin-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-top: 0.75rem; display: none; }
    .admin-panel label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 6px; }
    .admin-error { font-size: 12px; color: #c0392b; margin-top: 6px; display: none; }
    @media (max-width: 480px) { .flag-emoji { font-size: 34px; } thead th, td { padding: 9px 10px; } .score-cell { font-size: 13px; letter-spacing: 1px; } .badge { font-size: 10px; padding: 2px 7px; } }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <span class="event-label">⚽ Copa del Mundo 2026</span><br>
    <span class="group-badge">🏆 Grupo LANDFUS</span>
    <div class="flags">
      <div class="flag-block"><span class="flag-emoji">🇨🇴</span><span class="flag-name">Colombia</span></div>
      <span class="vs-text">vs</span>
      <div class="flag-block"><span class="flag-emoji">🇨🇩</span><span class="flag-name">Rep. del Congo</span></div>
    </div>
    <h1>Polla del partido</h1>
  </div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat-card"><div class="stat-num" id="stat-col">0</div><div class="stat-label">🇨🇴 Gana Colombia</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-emp">0</div><div class="stat-label">🤝 Empate</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-con">0</div><div class="stat-label">🇨🇩 Gana Congo</div></div>
  </div>

  <div class="card">
    <label for="username">¿Cuál es tu nombre de usuario?</label>
    <div class="input-row">
      <input type="text" id="username" placeholder="Ej: JuanGol99" maxlength="30" autocomplete="off" />
      <button class="btn btn-blue" id="btn-sortear">Sortear ⚽</button>
    </div>
    <p class="error-msg" id="error-msg">Ingresa tu nombre de usuario primero.</p>
  </div>

  <div class="banner banner-green" id="banner-new">✅ <span id="banner-new-text"></span></div>
  <div class="banner banner-warn" id="banner-already">⚠️ <span id="banner-already-text"></span></div>

  <div class="table-section">
    <div class="section-header">
      <span class="section-title">Participantes</span>
      <span class="count-pill" id="count-pill">0</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Nombre</th><th class="center">Marcador</th><th class="center">Resultado</th></tr></thead>
        <tbody id="tabla-body"><tr class="empty-row"><td colspan="4">Cargando participantes...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="admin-toggle-wrap">
    <button class="admin-toggle-btn" onclick="toggleAdmin()">⚙️ Panel de administrador</button>
  </div>
  <div class="admin-panel" id="admin-panel">
    <label>Contraseña de administrador</label>
    <div class="input-row">
      <input type="password" id="admin-pass" placeholder="Contraseña..." />
      <button class="btn btn-red" id="btn-reset">Reiniciar polla</button>
    </div>
    <p class="admin-error" id="admin-error">Contraseña incorrecta.</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, onSnapshot, query, orderBy, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDJmKhLbxQOxNzVI35hwDsN3FCttiUS6E8",
    authDomain: "polla-mundial-42fda.firebaseapp.com",
    projectId: "polla-mundial-42fda",
    storageBucket: "polla-mundial-42fda.firebasestorage.app",
    messagingSenderId: "176255557121",
    appId: "1:176255557121:web:b852e20b8bf1e1345dea00"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  // COLECCIÓN INDEPENDIENTE PARA LANDFUS
  const dbCollection = collection(db, "polla_LANDFUS_2026");
  const ADMIN_PASS = 'admin123';
  let participantes = [];

  // Escuchar la base de datos en tiempo real
  const q = query(dbCollection, orderBy("fecha", "desc"));
  onSnapshot(q, (snapshot) => {
    participantes = [];
    snapshot.forEach((doc) => {
      participantes.push(doc.data());
    });
    renderTabla(null);
  }, (error) => {
    console.error("Error cargando datos de Firebase: ", error);
  });

  async function sortear() {
    const input = document.getElementById('username');
    const nombre = input.value.trim();
    const errorEl = document.getElementById('error-msg');
    ocultarBanners();
    if (!nombre) { errorEl.style.display = 'block'; input.focus(); return; }
    errorEl.style.display = 'none';
    
    const existe = participantes.find(p => p.nombre.toLowerCase() === nombre.toLowerCase());
    if (existe) {
      mostrarBanner('already', `<strong>${esc(existe.nombre)}</strong> ya participó con el marcador 🇨🇴 ${existe.golesColombia} – ${existe.golesConcho} 🇨🇩. ¡Solo se permite una vez!`);
      input.value = ''; return;
    }
    
    const gc = Math.floor(Math.random() * 6);
    const gk = Math.floor(Math.random() * 6);
    let resultado;
    if (gc > gk) resultado = 'colombia'; else if (gk > gc) resultado = 'congo'; else resultado = 'empate';
    
    const nuevo = { 
      nombre, 
      golesColombia: gc, 
      golesConcho: gk, 
      resultado,
      fecha: Date.now()
    };

    try {
      // Guardar en Firebase usando el nombre de usuario en minúsculas como ID único
      await setDoc(doc(dbCollection, nombre.toLowerCase()), nuevo);
      mostrarBanner('new', `¡Listo, <strong>${esc(nombre)}</strong>! Tu marcador: 🇨🇴 ${gc} – ${gk} 🇨🇩`);
      input.value = '';
    } catch (e) {
      console.error("Error guardando en Firebase: ", e);
      alert("Hubo un error al guardar tu resultado. Intenta de nuevo.");
    }
  }

  async function resetPolla() {
    const pass = document.getElementById('admin-pass').value;
    const errEl = document.getElementById('admin-error');
    if (pass !== ADMIN_PASS) { errEl.style.display = 'block'; return; }
    errEl.style.display = 'none';

    if(confirm("¿Estás seguro de que deseas borrar TODOS los datos de esta polla?")) {
      try {
        const snapshot = await getDocs(dbCollection);
        const batch = writeBatch(db);
        snapshot.docs.forEach((doc) => {
          batch.delete(doc.ref);
        });
        await batch.commit();
        
        document.getElementById('admin-pass').value = '';
        document.getElementById('admin-panel').style.display = 'none';
        ocultarBanners();
      } catch (e) {
        console.error("Error al resetear la polla: ", e);
      }
    }
  }

  function renderTabla(highlightNombre) {
    const tbody = document.getElementById('tabla-body');
    document.getElementById('count-pill').textContent = participantes.length;
    if (participantes.length === 0) {
      document.getElementById('stats').style.display = 'none';
      tbody.innerHTML = '<tr class="empty-row"><td colspan="4">Aún no hay participantes. ¡Sé el primero!</td></tr>'; return;
    }
    document.getElementById('stats').style.display = 'grid';
    document.getElementById('stat-col').textContent = participantes.filter(p => p.resultado === 'colombia').length;
    document.getElementById('stat-emp').textContent = participantes.filter(p => p.resultado === 'empate').length;
    document.getElementById('stat-con').textContent = participantes.filter(p => p.resultado === 'congo').length;
    tbody.innerHTML = participantes.map((p, i) => {
      const b = getBadge(p.resultado);
      return `<tr class="${p.nombre === highlightNombre ? 'new-row' : ''}"><td class="pos">${i+1}</td><td class="user-name">${esc(p.nombre)}</td><td class="score-cell">🇨🇴 ${p.golesColombia} – ${p.golesConcho} 🇨🇩</td><td class="center"><span class="badge ${b.cls}">${b.txt}</span></td></tr>`;
    }).join('');
  }

  // Vinculación de funciones a los botones
  document.getElementById('btn-sortear').addEventListener('click', sortear);
  document.getElementById('btn-reset').addEventListener('click', resetPolla);
  document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') sortear(); });
</script>

<script>
  function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function getBadge(r) {
    if (r === 'colombia') return { cls: 'badge-col', txt: '🇨🇴 Colombia' };
    if (r === 'congo')    return { cls: 'badge-con', txt: '🇨🇩 Congo' };
    return { cls: 'badge-tie', txt: '🤝 Empate' };
  }
  function mostrarBanner(tipo, html) {
    ocultarBanners();
    const id = tipo === 'new' ? 'banner-new' : 'banner-already';
    const txtId = tipo === 'new' ? 'banner-new-text' : 'banner-already-text';
    document.getElementById(txtId).innerHTML = html;
    document.getElementById(id).classList.add('show');
  }
  function ocultarBanners() {
    document.getElementById('banner-new').classList.remove('show');
    document.getElementById('banner-already').classList.remove('show');
  }
  function toggleAdmin() {
    const p = document.getElementById('admin-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
    document.getElementById('admin-error').style.display = 'none';
  }
</script>
</body>
</html>
